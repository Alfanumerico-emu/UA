    <style>
        /* === RESET Y VARIABLES === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff; /* Texto blanco para contrastar con el fondo */
            position: relative;
        }

        /* === FONDO === */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fondo_1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* OPACIDAD DEL FONDO: Aquí puedes modificar el 1 (100%) por 0.8, 0.5, etc. */
            opacity: .9; 
            
            z-index: -1; /* Mantiene la imagen detrás del contenido */
        }

        /* Opcional: Una capa oscura suave si la imagen de fondo es muy clara y no deja leer el texto */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Ajusta este valor si necesitas oscurecer el fondo */
            z-index: -1;
        }

        /* === CONTENEDOR PRINCIPAL === */
        .container {
            width: 100%;
            max-width: 480px; /* Ancho máximo para pantallas móviles */
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* === PERFIL Y TEXTOS === */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%; /* Círculo perfecto */
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        p {
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 5px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        .since {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* === BOTONES (ESTILO MIDDLETON) === */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espaciado entre botones */
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background-color: #ffffff;
            color: #1a1a1a; /* Texto oscuro/negro */
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 30px; /* Bordes redondeados tipo píldora */
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-3px); /* Efecto de elevación */
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        /* === ICONOS SVG === */
        .btn svg {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            fill: currentColor; /* Hereda el color del texto (#1a1a1a) */
        }
    </style>
</head>
